# SOP Chat 统一配置文件

# 全局配置（支持从环境变量读取）
global:
  accessKeyId: "$ACCESS_KEY_ID"      # 如果为空，将从 ACCESS_KEY_ID 环境变量读取
  accessKeySecret: "$ACCESS_KEY_SECRET"   # 如果为空，将从 ACCESS_KEY_SECRET 环境变量读取
  endpoint: "cms.cn-hangzhou.aliyuncs.com"          # 如果为空，将从 CMS_ENDPOINT 环境变量读取
  port: 8999            # 服务监听端口（如果为 0，将从 PORT 环境变量读取，默认: 8080）
  timeZone: "Asia/Shanghai"          # 时区设置（默认: Asia/Shanghai）
  language: "zh"                     # 语言设置（默认: zh）

# 认证配置
auth:
  # 认证模式: local, ldap, oidc, disabled
  method: local
  
  # JWT 配置
  jwtSecretKey: default-secret-key-change-in-production
  jwtExpiresIn: 24h
  
  # 本地认证配置
  local:
    user:
      - name: admin
        # password 字段存储的是 MD5 哈希后的密码
        # 例如: echo -n "admin" | md5sum
        password: 21232f297a57a5a743894a0e4a801fc3  # admin 的 MD5 哈希
      - name: sls
        password: 21232f297a57a5a743894a0e4a801fc3  # admin 的 MD5 哈希
    
    roles:
      - name: admin
        user:  # 对应 role 下的用户列表
          - admin
